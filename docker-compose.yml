version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}" 
    env_file:
      - .env 
    volumes:
      - ./model:/app/model 
      - ./results:/app/results 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s 

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "${UI_PORT:-7860}:${UI_PORT:-7860}"
    environment:
      - API_URL=http://api:${API_PORT:-8000}/predict
    depends_on:
      api:
        condition: service_healthy
    command: ["sh", "-c", "python app.py"]
